name: Build macOS Intel

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-mac-intel:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app with PyInstaller
        run: |
          pyinstaller \
            --name "NutriApp" \
            --windowed \
            --onefile \
            --target-arch arm64 \
            --hidden-import customtkinter \
            --hidden-import PIL \
            --hidden-import PIL._tkinter_finder \
            --hidden-import reportlab \
            --hidden-import reportlab.graphics.shapes \
            --hidden-import reportlab.lib.pagesizes \
            --hidden-import reportlab.platypus \
            --add-data "assets:assets" \
            main.py

      - name: Compress .app bundle
        run: |
          cd dist
          zip -r ../NutriApp-mac-arm64.zip NutriApp.app
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NutriApp ${{ github.ref_name }}"
          body: |
            ## NutriApp ${{ github.ref_name }}

            ### Descarga
            - **macOS Apple Silicon (M1/M2/M3):** descarga `NutriApp-mac-arm64.zip`, descomprime y arrastra `NutriApp.app` a Aplicaciones.

            ### Qué incluye esta versión
            - Evaluación antropométrica ISAK 1 e ISAK 2
            - Somatotipo Heath & Carter con somatocarta en PDF
            - Gestión de pacientes y planes alimenticios
            - Reportes PDF comparativos multi-sesión
            - Curvas de evolución con gráficos matplotlib
            - Clasificación automática (% grasa, IMC, WHR, WHtR)
            - Edición completa de evaluaciones pasadas
          files: NutriApp-mac-arm64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
