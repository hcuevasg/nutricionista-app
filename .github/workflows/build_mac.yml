name: Build macOS Intel

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-mac-intel:
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license

      - name: Install Python 3.9 universal2
        run: |
          curl -LO https://www.python.org/ftp/python/3.9.13/python-3.9.13-macos11.pkg
          sudo installer -pkg python-3.9.13-macos11.pkg -target /

      - name: Install dependencies (x86_64 via Rosetta)
        run: |
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.9/bin/python3.9 -m pip install --upgrade pip
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.9/bin/python3.9 -m pip install -r requirements.txt
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.9/bin/python3.9 -m pip install pyinstaller

      - name: Build app with PyInstaller (x86_64 via Rosetta)
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          arch -x86_64 /Library/Frameworks/Python.framework/Versions/3.9/bin/python3.9 -m PyInstaller \
            --name "NutriApp" \
            --windowed \
            --onedir \
            --hidden-import customtkinter \
            --hidden-import PIL \
            --hidden-import PIL._tkinter_finder \
            --hidden-import reportlab \
            --hidden-import reportlab.graphics.shapes \
            --hidden-import reportlab.lib.pagesizes \
            --hidden-import reportlab.platypus \
            --add-data "assets:assets" \
            main.py

      - name: Compress .app bundle
        run: |
          cd dist
          zip -r ../NutriApp-mac-intel.zip NutriApp.app
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "NutriApp ${{ github.ref_name }}"
          body: |
            ## NutriApp ${{ github.ref_name }}

            ### Descarga
            - **macOS Intel (x86_64) — compatible con Big Sur 11.6+:** descarga `NutriApp-mac-intel.zip`, descomprime y arrastra `NutriApp.app` a Aplicaciones.

            ### Qué incluye esta versión
            - Evaluación antropométrica ISAK 1 e ISAK 2
            - Somatotipo Heath & Carter con somatocarta en PDF
            - Gestión de pacientes y planes alimenticios
            - Reportes PDF comparativos multi-sesión
            - Curvas de evolución con gráficos matplotlib
            - Clasificación automática (% grasa, IMC, WHR, WHtR)
            - Edición completa de evaluaciones pasadas
          files: NutriApp-mac-intel.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
